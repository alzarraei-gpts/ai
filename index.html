  <script id="site-text-cleanup-v11" defer>
  (function(){
    'use strict';
    var p1=['وفق المحتوى المستخرج من ملف كل',' الباقات'].join('');
    var p2=['10 باقات',' قابلة للتوسع'].join('');
    var p3=['تصميم خفيف متوافق مع الجوال',' والهوية الذهبية.'].join('');
    function norm(t){return (t||'').replace(/\s+/g,' ').trim()}
    function cleanTextValue(v){
      if(!v)return v;
      v=v.split(p1).join('');
      v=v.split(p3).join('');
      v=v.replace(/اختر الباقة المطلوبة[\.،]?\s*اختر الباقة المطلوبة[\.،]?/g,'اختر الباقة المطلوبة.');

      v=v.replace(/\s+([،.])/g,'$1').replace(/[ \t]{2,}/g,' ');
      return v;
    }
    function cleanTextNodes(root){
      var walker=document.createTreeWalker(root||document.body,NodeFilter.SHOW_TEXT,null);
      var nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
      nodes.forEach(function(n){var v=cleanTextValue(n.nodeValue); if(v!==n.nodeValue)n.nodeValue=v;});
    }
