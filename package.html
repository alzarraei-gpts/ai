  <style id="chatgpt-social-footer-v8">
    :root{--cg-bg-deep:#06130d;--cg-bg-panel:#0a1d14;--cg-gold:#d2a53d;--cg-gold-soft:#f0dc9b;--cg-line:rgba(210,165,61,.42);--cg-text:#f5ecd2;--cg-muted:#d8c996}

    .cg-social-links{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:10px}
    .cg-social-link{display:inline-flex;align-items:center;justify-content:flex-start;gap:10px;min-height:46px;padding:10px 13px;border:1px solid rgba(210,165,61,.30);border-radius:16px;background:rgba(9,24,16,.70);color:var(--cg-text)!important;text-decoration:none!important;font-weight:750;line-height:1;transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease}
    .cg-social-link:hover{transform:translateY(-2px);border-color:rgba(210,165,61,.70);background:rgba(210,165,61,.10);box-shadow:0 12px 28px rgba(0,0,0,.22)}
    .cg-social-icon{display:inline-grid;place-items:center;width:30px;height:30px;min-width:30px;border-radius:10px;color:#07130d;background:linear-gradient(135deg,#f2d27a,#c89534);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
    .cg-social-icon svg{width:18px;height:18px;display:block;fill:currentColor;stroke:currentColor}
    .cg-social-footer__bottom{display:flex;align-items:center;justify-content:space-between;gap:14px;color:rgba(245,236,210,.72);font-size:.86rem;line-height:1.7;padding-top:2px}
    .cg-floating-whatsapp{position:fixed;left:18px;bottom:18px;z-index:9999;display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:54px;padding:12px 18px;border-radius:999px;border:1px solid rgba(240,220,155,.72);background:linear-gradient(135deg,#d8ad48,#bd8425);color:#07130d!important;text-decoration:none!important;font-weight:900;box-shadow:0 16px 36px rgba(0,0,0,.32),0 0 0 5px rgba(216,173,72,.10);transition:transform .18s ease,box-shadow .18s ease}
    .cg-floating-whatsapp:hover{transform:translateY(-2px);box-shadow:0 20px 44px rgba(0,0,0,.38),0 0 0 6px rgba(216,173,72,.14)}
    .cg-floating-whatsapp .cg-social-icon{background:rgba(7,19,13,.95);color:#f2d27a;border-radius:50%}
    @media(max-width:720px){.footer .shell{width:min(100% - 24px,1180px);padding-bottom:88px!important}.cg-social-footer__head,.cg-social-footer__bottom{flex-direction:column;align-items:flex-start}.cg-social-links{grid-template-columns:repeat(2,minmax(0,1fr))}.cg-social-link{min-height:44px;padding:9px 10px;font-size:.9rem}.cg-floating-whatsapp{left:14px;bottom:14px;min-height:50px;padding:11px 15px}}
    @media(max-width:420px){.cg-social-links{grid-template-columns:1fr}}
  </style>

      function normalize(text) {
        return (text || '').replace(/\s+/g, ' ').trim();
      }

      function exactText(el) {
        return normalize(el && el.textContent || '');
      }

      function ensureLogo() {
        document.querySelectorAll('.brand-mark, .brand-logo').forEach(function(el) {
          if (el.dataset.cgLogoReady === '1') return;
          el.classList.add('brand-logo');
          el.innerHTML = '';
          var img = document.createElement('img');
          img.src = LOGO_SRC;
          img.alt = 'شعار بوابة النماذج الذكية';
          img.decoding = 'async';
          el.appendChild(img);
          el.dataset.cgLogoReady = '1';
        });
      }

      function dedupeRepeatedPhrases() {
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
        var targets = [];
        while (walker.nextNode()) {
          targets.push(walker.currentNode);
        }
        targets.forEach(function(node) {
          var value = node.nodeValue;
          if (!value || !value.trim()) return;
          value = value.replace(/(اختر الباقة المطلوبة[\.،]?\s*){2,}/g, 'اختر الباقة المطلوبة. ');
          value = value.replace(/(اختر التقسيم المطلوب[\.،]?\s*){2,}/g, 'اختر التقسيم المطلوب. ');
          node.nodeValue = value;
        });
      }

      function findStatsLikeRow(scope) {
        if (!scope) return null;
        var candidates = scope.querySelectorAll('div, ul, nav, section');
        for (var i = 0; i < candidates.length; i++) {
          var el = candidates[i];
          if (el.closest('[data-chatgpt-hero]') && scope !== el.closest('[data-chatgpt-hero]')) continue;
          var children = Array.from(el.children || []);
          if (children.length < 2 || children.length > 6) continue;
          var text = exactText(el);
          if (!/\d/.test(text)) continue;
          var shortChildren = children.every(function(child) { return exactText(child).length > 0 && exactText(child).length <= 30; });
          if (!shortChildren) continue;
          return el;
        }
        return null;
      }

      function findHeroRoot() {
        var heading = Array.from(document.querySelectorAll('#app h1, #app h2')).find(function(h) {
          return exactText(h).indexOf('بوابة النماذج الذكية') !== -1;
        });
        if (!heading) return null;
        var current = heading.parentElement;
        while (current && current.id !== 'app') {
          if (current.querySelector('p')) return current;
          current = current.parentElement;
        }
        return heading.parentElement;
      }

      function ensureHomeHeroButton() {
        if (document.body.dataset.page !== 'public-home') return;
        var hero = findHeroRoot();
        if (!hero) return;
        hero.setAttribute('data-chatgpt-hero', '1');
        var paragraph = hero.querySelector('p');
        var statsRow = findStatsLikeRow(hero);
        var actions = hero.querySelector('.chatgpt-hero-actions');
        if (!actions) {
          actions = document.createElement('div');
          actions.className = 'chatgpt-hero-actions';
          var btnGroup = document.createElement('div');
          btnGroup.className = 'chatgpt-btn-group';
          var sectionsBtn = document.createElement('a');
          sectionsBtn.href = 'package.html';
          sectionsBtn.className = 'chatgpt-btn primary';
          sectionsBtn.textContent = 'الدخول للتقسيمات';
          btnGroup.appendChild(sectionsBtn);
          actions.appendChild(btnGroup);
          if (statsRow) {
            statsRow.classList.add('chatgpt-stats-row');
            actions.appendChild(statsRow);
          }
          if (paragraph && paragraph.parentElement === hero) {
            paragraph.insertAdjacentElement('afterend', actions);
          } else {
            hero.appendChild(actions);
          }
        }
      }

      function findFirstContentCard() {
        var selectors = [
          '#app [class*="grid"] > *',
          '#app [class*="list"] > *',
          '#app article',
          '#app [class*="card"]',
          '#app [class*="package"]',
          '#app [class*="section"]'
        ];
        for (var s = 0; s < selectors.length; s++) {
          var found = Array.from(document.querySelectorAll(selectors[s])).find(function(el) {
