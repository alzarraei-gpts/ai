  <style id="discount-banner-v1">
    .discount-banner-v1{
      --banner-radius:0px;
      --banner-h:clamp(92px,9.87vw,188px);
      position:relative;
      isolation:isolate;
      overflow:hidden;
      width:100%;
      min-height:var(--banner-h);
      background:#01291f;
      border-bottom:1px solid rgba(209,161,58,.34);
      box-shadow:0 18px 48px rgba(0,0,0,.24), inset 0 -1px 0 rgba(240,217,140,.22);
      transform:translateZ(0);
    }
    .discount-banner-v1::before,
    .discount-banner-v1::after,
    .discount-banner-link-v1::before,
    .discount-banner-link-v1::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:2;
    }
    .discount-banner-v1::before{
      background:
        radial-gradient(circle at 76% 42%,rgba(65,255,169,.20),transparent 24%),
        radial-gradient(circle at 61% 54%,rgba(240,217,140,.16),transparent 22%),
        linear-gradient(90deg,transparent 0%,rgba(240,217,140,.06) 48%,transparent 100%);
      mix-blend-mode:screen;
      opacity:.58;
      animation:discountBannerGlowV9 7.8s ease-in-out infinite alternate;
    }
    .discount-banner-v1::after{
      width:42%;
      left:auto;
      right:-45%;
      background:linear-gradient(100deg,transparent 0%,rgba(255,232,157,.00) 32%,rgba(255,232,157,.20) 49%,rgba(64,255,168,.11) 58%,transparent 74%);
      filter:blur(1px);
      opacity:.32;
      animation:discountBannerSweepV9 9.5s ease-in-out infinite;
    }
    .discount-banner-link-v1{
      position:relative;
      z-index:1;
      display:block;
      width:100%;
      min-height:var(--banner-h);
      border-radius:var(--banner-radius);
      overflow:hidden;
      outline:none;
    }
    .discount-banner-link-v1::before{
      background:linear-gradient(180deg,rgba(255,255,255,.045),transparent 42%,rgba(0,0,0,.10));
      opacity:.68;
      animation:discountBannerBreathV9 6.8s ease-in-out infinite alternate;
    }
    .discount-banner-link-v1::after{
      inset:auto 0 0 0;
      height:2px;
      background:linear-gradient(90deg,transparent,rgba(240,217,140,.70),rgba(50,222,142,.46),transparent);
      opacity:.72;
      animation:discountBannerLineV9 4.9s ease-in-out infinite alternate;
    }
    .discount-banner-img-v1{
      display:block;
      width:100%;
      height:var(--banner-h);
      object-fit:cover;
      object-position:center center;
      border:0;
      filter:saturate(1.09) contrast(1.06) brightness(1.02);
      transform-origin:center;
      will-change:transform,filter;
      animation:discountBannerFloatV9 7.6s ease-in-out infinite;
    }
    .discount-banner-v1:hover .discount-banner-img-v1,
    .discount-banner-v1:focus-within .discount-banner-img-v1{
      transform:scale(1.018) translateY(-1px);
      filter:saturate(1.16) contrast(1.09) brightness(1.05);
    }
    .discount-banner-v1:hover,
    .discount-banner-v1:focus-within{
      box-shadow:0 22px 62px rgba(0,0,0,.32),0 0 34px rgba(48,221,142,.16), inset 0 -1px 0 rgba(240,217,140,.32);
    }
    .discount-banner-pulse-v1{display:none!important}
    @keyframes discountBannerGlowV9{0%{opacity:.45;transform:scale(1) translateX(1.4%)}50%{opacity:.66;transform:scale(1.025) translateX(-.4%)}100%{opacity:.54;transform:scale(1.045) translateX(-1.1%)}}
    @keyframes discountBannerSweepV9{0%{transform:translateX(0);opacity:.00}15%{opacity:.22}48%{opacity:.38}100%{transform:translateX(-330%);opacity:.00}}
    @keyframes discountBannerBreathV9{0%{opacity:.48}100%{opacity:.78}}
    @keyframes discountBannerLineV9{0%{transform:translateX(18%);opacity:.34}100%{transform:translateX(-18%);opacity:.78}}
    @keyframes discountBannerFloatV9{0%,100%{transform:scale(1.004) translateY(0)}50%{transform:scale(1.012) translateY(-1px)}}
    @media(min-width:1800px){.discount-banner-v1{--banner-h:min(9.87vw,188px)}.discount-banner-img-v1{object-position:center center}}
    @media(max-width:1440px){.discount-banner-v1{--banner-h:clamp(110px,10vw,142px)}.discount-banner-img-v1{object-position:55% center}}
    @media(max-width:1180px){.discount-banner-v1{--banner-h:clamp(106px,11.5vw,136px)}.discount-banner-img-v1{object-position:61% center}}

    @media(max-width:760px){.discount-banner-v1{--banner-h:clamp(102px,17vw,124px)}.discount-banner-img-v1{object-position:72% center}.discount-banner-v1::before{opacity:.62}.discount-banner-link-v1::after{height:1px}}
    @media(max-width:620px){.discount-banner-v1{--banner-h:clamp(100px,21vw,118px)}.discount-banner-img-v1{object-position:76% center}.discount-banner-v1::before{background:radial-gradient(circle at 82% 48%,rgba(65,255,169,.22),transparent 30%),linear-gradient(90deg,transparent,rgba(240,217,140,.08),transparent)}.discount-banner-v1::after{opacity:.24}}
    @media(max-width:480px){.discount-banner-v1{--banner-h:clamp(96px,25vw,112px)}.discount-banner-img-v1{object-position:80% center}.discount-banner-v1::after{width:68%;right:-72%}}
    @media(max-width:390px){.discount-banner-v1{--banner-h:96px}.discount-banner-img-v1{object-position:83% center}.discount-banner-v1::before{opacity:.52}}
    @media(max-width:340px){.discount-banner-v1{--banner-h:92px}.discount-banner-img-v1{object-position:85% center}}
    @media(prefers-reduced-motion:reduce){.discount-banner-v1::before,.discount-banner-v1::after,.discount-banner-link-v1::before,.discount-banner-link-v1::after,.discount-banner-img-v1{animation-duration:18s!important;animation-iteration-count:infinite!important}}
  </style>

<script id="compact-portal-hero-v3-script">
  (function(){
    'use strict';
    function norm(t){return (t||'').replace(/\s+/g,' ').trim();}
    function all(root,sel){return [].slice.call((root||document).querySelectorAll(sel));}
    function findText(root,sel,texts){return all(root,sel).find(function(x){return texts.indexOf(norm(x.textContent))>-1;});}
    function nearestContentBlock(el){return el && (el.closest('section,[class*="hero"],[class*="intro"],[class*="header"],.shell') || el.parentElement);}
    function findNearbyParagraph(h){
      var n=h.nextElementSibling;
      while(n){ if(n.tagName==='P')return n; if(/^(H1|H2|H3|SECTION)$/i.test(n.tagName))break; n=n.nextElementSibling; }
      var parent=h.parentElement;
      if(parent){
        var ps=all(parent,'p').filter(function(p){return p!==h && norm(p.textContent).length>6;});
        if(ps.length)return ps[0];
      }
      var sec=h.closest('section,.section-head,[class*="section"],.shell') || document.getElementById('app');
      return all(sec,'p').filter(function(p){return norm(p.textContent).length>6;})[0]||null;
    }
    function extractPortalChips(app){
      var h=all(app,'h1').find(function(x){return norm(x.textContent)==='بوابة النماذج الذكية';});
      if(!h)return null;
      var block=nearestContentBlock(h);
      var chips=[];
      if(block){
        chips=all(block,'.chips,[class*="chips"],[class*="stats"],[class*="badges"]').filter(function(x){return norm(x.textContent).match(/الباقات|التصنيفات|البوتات|الحالية|\d/);});
        if(!chips.length){
          var chipItems=all(block,'.chip,[class*="chip"],[class*="badge"],[class*="stat"]').filter(function(x){return norm(x.textContent).match(/الباقات|التصنيفات|البوتات|الحالية|\d/);});
          if(chipItems.length){
            var wrap=document.createElement('div');
            wrap.className='cg-title-chips';
            chipItems.forEach(function(x){wrap.appendChild(x);});
            chips=[wrap];
          }
        }
        block.classList.add('cg-remove-portal-intro');
      }else if(h.parentElement){
        h.parentElement.classList.add('cg-remove-portal-intro');
      }
      if(chips.length){
        chips[0].classList.add('cg-title-chips');
        return chips[0];
      }
      return null;
    }
    function compactHeading(app, movedChips){
      var h=findText(app,'h2',['الباقات','التصنيفات','البوتات']) || findText(app,'h1',['الباقات','التصنيفات','البوتات']);
      if(!h || h.dataset.inlineHeadingReady)return;
      var p=findNearbyParagraph(h);
      if(!p)return;
      var row=document.createElement('div');
      row.className='cg-inline-heading-row';
      var sep=document.createElement('span');
      sep.className='cg-inline-heading-sep';
      sep.textContent='|';
      h.classList.add('cg-inline-heading-title');
      p.classList.add('cg-inline-heading-subtitle');
      h.parentNode.insertBefore(row,h);
      row.appendChild(h);
      row.appendChild(sep);
      row.appendChild(p);
      var localChips=all(app,'.chips,[class*="chips"],[class*="stats"],[class*="badges"]').find(function(x){return !x.closest('.cg-remove-portal-intro') && norm(x.textContent).match(/الباقات|التصنيفات|البوتات|الحالية|\d/);});
      var chips=movedChips || localChips;
      if(chips && !chips.closest('.cg-inline-heading-row')){chips.classList.add('cg-title-chips'); row.appendChild(chips);}
      var block=h.closest('section,.section-head,[class*="section"],.shell') || row.parentElement;
      if(block)block.classList.add('cg-heading-section');
      h.dataset.inlineHeadingReady='1';
    }
    function enhance(){
      var app=document.getElementById('app');
      if(!app)return;
      var chips=extractPortalChips(app);
      compactHeading(app,chips);
    }
    function boot(){enhance(); setTimeout(enhance,80); setTimeout(enhance,250); setTimeout(enhance,700); setTimeout(enhance,1400);}
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
    new MutationObserver(function(){enhance();}).observe(document.documentElement,{childList:true,subtree:true});
  })();
</script>


<script id="final-remove-portal-intro-v4">
  (function(){
    'use strict';
    function norm(t){return (t||'').replace(/\s+/g,' ').trim();}
    function all(root,sel){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
    function hidePortalIntro(){
      var app=document.getElementById('app');
      if(!app)return;
      all(app,'h1,h2,.hero h1,.hero h2,[class*="hero"] h1,[class*="hero"] h2').forEach(function(h){
        if(norm(h.textContent)==='بوابة النماذج الذكية'){
          var block=h.closest('section,header,.hero,.hero-grid,.shell,[class*="hero"],[class*="intro"],[class*="header"]') || h.parentElement;
          if(block){
            block.classList.add('cg-force-hide-portal-intro');
            block.setAttribute('data-cg-portal-intro-hidden','true');
          }else{
            h.classList.add('cg-force-hide-portal-intro');
            h.setAttribute('data-cg-portal-intro-hidden','true');
          }
        }
      });
      /* توحيد رؤوس الباقات/التصنيفات/البوتات في سطر واحد متى ظهرت */
      all(app,'h1,h2').forEach(function(h){
        var t=norm(h.textContent);
        if(!/^(الباقات|التصنيفات|البوتات)$/.test(t) || h.dataset.cgInlineFinal==='1')return;
        var p=h.nextElementSibling;
        while(p && p.tagName!=='P')p=p.nextElementSibling;
        if(!p || norm(p.textContent).length<5)return;
        var row=document.createElement('div');
        row.className='cg-inline-heading-row';
        var sep=document.createElement('span');
        sep.className='cg-inline-heading-sep';
        sep.textContent='|';
        h.classList.add('cg-inline-heading-title');
        p.classList.add('cg-inline-heading-subtitle');
        h.parentNode.insertBefore(row,h);
        row.appendChild(h); row.appendChild(sep); row.appendChild(p);
        h.dataset.cgInlineFinal='1';
      });
    }
    function boot(){hidePortalIntro();setTimeout(hidePortalIntro,80);setTimeout(hidePortalIntro,250);setTimeout(hidePortalIntro,700);setTimeout(hidePortalIntro,1400);}
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
    new MutationObserver(function(){requestAnimationFrame(hidePortalIntro);}).observe(document.documentElement,{childList:true,subtree:true,characterData:true});
  })();
</script>

<script id="package-card-taxonomy-footer-v8-script">
(function(){
  'use strict';
  function norm(t){return (t||'').replace(/\s+/g,' ').trim();}
  function all(root,sel){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
  function fixArabicText(s){
    if(!s)return s;
    return s
      .replace(/الدخول للتقسيمات/g,'الدخول للتصنيفات')
      .replace(/الدخول إلى التقسيمات/g,'الدخول إلى التصنيفات')
      .replace(/التقسيمات/g,'التصنيفات')
      .replace(/التقسيم/g,'التصنيف')
      .replace(/(\d+)\s+تصنيفات/g,'$1 تصنيفاً')
      .replace(/قسم يضم/g,'تصنيف يضم')
      .replace(/(\d+)\s+بوتات/g,'$1 بوتًا');
  }
  function cleanTextNodes(root){
    var walker=document.createTreeWalker(root||document.body,NodeFilter.SHOW_TEXT,null), nodes=[];
    while(walker.nextNode())nodes.push(walker.currentNode);
    nodes.forEach(function(n){var v=fixArabicText(n.nodeValue); if(v!==n.nodeValue)n.nodeValue=v;});
  }
  function packages(){
    var roots=[window.RESEARCH_DATA,window.DATA,window.researchData,window.APP_DATA].filter(Boolean);
    var arr=[];
    roots.forEach(function(r){ if(r && Array.isArray(r.packages)) arr=arr.concat(r.packages); });
    return arr;
  }
  function packageByTitle(title){
    title=norm(title);
    return packages().find(function(p){return norm(p.title)===title;});
  }
  function makeChip(text){var s=document.createElement('span');s.className='chip cg-package-chip';s.textContent=text;return s;}
  function likelyPackageCard(card){
    var h=card.querySelector('h2,h3,h4');
    if(!h)return false;
    var t=norm(h.textContent);
    return /^باقة\s+/.test(t) || !!packageByTitle(t);
  }
  function ensurePackageFooter(card){
    if(!likelyPackageCard(card))return;
    card.classList.add('cg-package-card-fixed');
    var h=card.querySelector('h2,h3,h4');
    var pkg=packageByTitle(h ? h.textContent : '');
    var sec=pkg && Array.isArray(pkg.sections) ? pkg.sections.length : null;
    var bots=pkg && Array.isArray(pkg.sections) ? pkg.sections.reduce(function(n,s){return n+((s.bots||[]).length);},0) : null;
    var body=card.querySelector('.card-body') || card;
    var btn=all(body,'a,button').find(function(a){
      var t=norm(a.textContent);
      return /الدخول|التقسيمات|التصنيفات|استعراض/.test(t) || /package\.html|bots\.html/.test(a.getAttribute('href')||'');
    });
    if(btn){
      btn.textContent='الدخول للتصنيفات';
      if(btn.classList && !btn.classList.contains('btn'))btn.classList.add('btn');
      if(btn.classList)btn.classList.add('primary');
    }
    var footer=body.querySelector('.cg-package-footer-balanced') || body.querySelector('.card-footer-row');
    if(!footer){footer=document.createElement('div');body.appendChild(footer);} 
    footer.classList.add('card-footer-row','cg-package-footer-balanced');
    var cta=footer.querySelector('.cg-package-cta');
    if(!cta){cta=document.createElement('div');cta.className='card-cta cg-package-cta';footer.appendChild(cta);} 
    if(btn && btn.parentElement!==cta)cta.appendChild(btn);
    var chips=footer.querySelector('.cg-package-chips');
    if(!chips){chips=document.createElement('div');chips.className='chips cg-package-chips';footer.appendChild(chips);} 
    all(body,'.chips,[class*="chips"]').forEach(function(ch){
      if(ch!==chips && !ch.closest('.cg-package-footer-balanced')){
        all(ch,'.chip,[class*="chip"],span').forEach(function(x){
          var tx=norm(x.textContent); if(/تصنيف|بوت|قسم|تقسيم|\d/.test(tx)) x.remove();
        });
        if(!norm(ch.textContent))ch.remove();
      }
    });
    if(sec!==null && bots!==null){
      chips.textContent='';
      chips.appendChild(makeChip(sec+' تصنيفاً'));
      chips.appendChild(makeChip(bots+' بوتًا'));
    }else{
      all(chips,'.chip,[class*="chip"],span').forEach(function(x){x.textContent=fixArabicText(norm(x.textContent));});
    }
  }
  function run(){
    var app=document.getElementById('app');
    if(!app)return;
    cleanTextNodes(app);
    all(app,'.package-card,.card,article,[class*="card"]').forEach(ensurePackageFooter);
  }
  function boot(){run();setTimeout(run,80);setTimeout(run,250);setTimeout(run,700);setTimeout(run,1400);}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
  new MutationObserver(function(){requestAnimationFrame(run);}).observe(document.documentElement,{childList:true,subtree:true,characterData:true});
})();
</script>
